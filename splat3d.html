<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>prompt → 3D splats</title><style>:root{color-scheme:dark}html,body{color:#cdd6f4;background:#0b0d12;height:100%;margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}#wrap{flex-direction:column;justify-content:center;align-items:center;gap:14px;min-height:100%;padding:24px;display:flex}#grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:min(768px,100vw - 48px);display:grid}.tile{min-width:0;position:relative}.view{aspect-ratio:1;image-rendering:pixelated;background:#000;border:1px solid #313244;border-radius:8px;width:100%;display:block}.tile.active .view{border-color:#89b4fa}.label{color:#cdd6f4;pointer-events:none;background:#0b0d12b8;border-radius:4px;padding:2px 5px;font-size:11px;position:absolute;bottom:7px;left:7px}#controls{align-items:center;gap:8px;width:min(768px,100vw - 48px);display:flex}#prompt{color:#cdd6f4;font:inherit;background:#181825;border:1px solid #45475a;border-radius:6px;flex:1;min-width:0;padding:8px 10px;font-size:14px}select,button{color:#cdd6f4;font:inherit;cursor:pointer;background:#1e2030;border:1px solid #45475a;border-radius:6px;padding:8px 10px;font-size:13px}select{max-width:128px}button:hover,select:hover{border-color:#89b4fa}button:disabled,select:disabled{opacity:.5;cursor:default}#readout{color:#a6adc8;letter-spacing:.2px;width:min(768px,100vw - 48px);min-height:18px;font-size:13px}#notice{color:#f38ba8;width:min(768px,100vw - 48px);min-height:16px;font-size:13px}</style></head><body> <div id="wrap"> <div id="grid"></div> <div id="controls"> <input id="prompt" type="text" placeholder="a photo of a cat" value="a photo of a cat" autocomplete="off"> <select id="view"></select> <select id="promptMode"> <option value="camera">camera text</option> <option value="same">same text</option> </select> <select id="bgTextMode"> <option value="black">black bg</option> <option value="none">no bg text</option> </select> <button id="optimize">Optimize</button> <button id="reset">Reset</button> </div> <div id="readout">boot…</div> <div id="notice"></div> </div> <script src="splat3d.8c3c4ad2.js" defer></script> </body></html>
